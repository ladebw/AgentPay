name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentpay_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentpay_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          API_KEY_SALT: test-salt
          WEBHOOK_SIGNING_SECRET: test-secret
          KEY_MANAGEMENT_MODE: mock
        run: |
          pytest tests/ -v --cov=app --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint dependencies
        run: |
          pip install black flake8 mypy
      - name: Check formatting with Black
        run: black --check app/
      - name: Lint with Flake8
        run: flake8 app/ --max-line-length=88 --ignore=E203,W503
      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports